name: CI
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: 17
          - java: 25
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: ${{matrix.java}}
        distribution: temurin
    - uses: sbt/setup-sbt@v1
    - run: sbt
           --server
           -v
           "+ scalafmtCheckAll"
           scalafmtSbtCheck
           "+test"
